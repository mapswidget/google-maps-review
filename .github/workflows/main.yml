name: Update Google Reviews

on:
  schedule:
    # This runs at 00:00 every Sunday (UTC)
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # This allows you to click a button to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Grant permission to push the generated JSON files back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Playwright and Dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run Google Maps Scraper
        run: python update_reviews.py

      - name: Commit and Push Updates
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add reviews.json schema.json
          # Only commit if there are changes to avoid errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update reviews and SEO schema" && git push)
